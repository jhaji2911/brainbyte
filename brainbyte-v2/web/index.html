<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>BrainByte — Learn Smarter</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#14141f;--border:#1e1e30;
  --primary:#b6a0ff;--accent:#00e3fd;--text:#e0e0e0;--muted:#777;
  --save:#4ade80;--skip:#f87171;--warn:#facc15;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;height:100dvh;
  -webkit-font-smoothing:antialiased;
}
#app{height:100%;display:flex;flex-direction:column;position:relative}

/* ── Glow background ── */
.glow{position:fixed;pointer-events:none;z-index:0}
.glow-top{top:-200px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(182,160,255,.08),transparent 70%)}
.glow-bottom{bottom:-200px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,227,253,.06),transparent 70%)}

/* ── Screens ── */
.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.screen.active{display:flex}

/* ── Onboarding ── */
.logo{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:4px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:var(--muted);font-size:14px;margin-bottom:40px;text-align:center;line-height:1.5}
.input-wrap{width:100%;max-width:360px;margin-bottom:16px}
.input-wrap label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.input-wrap input{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);color:#fff;font-size:15px;outline:none;transition:border-color .2s}
.input-wrap input:focus{border-color:var(--primary)}

.interest-grid{display:flex;flex-wrap:wrap;gap:8px;max-width:360px;justify-content:center;margin-bottom:32px}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.chip.selected{border-color:var(--primary);color:var(--primary);background:rgba(182,160,255,.08)}
.chip:active{transform:scale(.95)}

.btn{padding:15px 48px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,var(--primary),#8b7fd4);color:#fff;width:100%;max-width:360px}
.btn-primary:active{transform:scale(.98);opacity:.9}
.btn-ghost{margin-top:16px;background:none;color:var(--muted);font-size:13px;font-weight:500}
.login-link{color:var(--primary);cursor:pointer;text-decoration:underline}

/* ── Header ── */
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;padding-top:max(env(safe-area-inset-top), 16px);z-index:10;position:relative}
.header-brand{font-size:18px;font-weight:800;letter-spacing:-.5px}
.header-stats{display:flex;gap:20px;font-size:11px;color:var(--muted)}
.header-stats div{text-align:center}
.header-stats span{display:block;font-size:15px;font-weight:800;color:var(--primary);margin-top:2px}

/* ── Card ── */
.card-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;z-index:1}
.card-wrap{position:absolute;width:88%;max-width:380px;transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .35s}
.card{background:linear-gradient(145deg,#1a1a2e,#14141f);border-radius:22px;padding:28px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(182,160,255,.3),transparent)}
.card-category{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:12px;background:rgba(182,160,255,.08);color:var(--primary);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:18px}
.card-title{font-size:21px;font-weight:800;line-height:1.3;margin-bottom:12px;color:#fff}
.card-body{font-size:14px;line-height:1.65;color:#aaa;margin-bottom:20px}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted)}
.card-source{display:flex;align-items:center;gap:4px}
.diff-badge{padding:3px 10px;border-radius:8px;font-size:10px;font-weight:800}
.diff-easy{background:rgba(74,222,128,.1);color:var(--save)}
.diff-medium{background:rgba(250,204,21,.1);color:var(--warn)}
.diff-hard{background:rgba(248,113,113,.1);color:var(--skip)}

.agent-reason{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
.agent-reason .brain{font-size:13px;flex-shrink:0}
.agent-reason .text{font-size:11px;color:var(--muted);line-height:1.4;font-style:italic}

/* ── Actions ── */
.actions{display:flex;align-items:center;justify-content:center;gap:20px;padding:20px 24px;padding-bottom:max(env(safe-area-inset-bottom), 20px);z-index:10;position:relative}
.action-circle{width:52px;height:52px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:20px}
.skip-btn{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.skip-btn:active{background:rgba(248,113,113,.15);color:var(--skip);border-color:rgba(248,113,113,.3);transform:scale(.92)}
.save-btn{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.save-btn:active{background:rgba(74,222,128,.15);color:var(--save);border-color:rgba(74,222,128,.3);transform:scale(.92)}
.learn-btn{width:62px;height:62px;background:linear-gradient(135deg,var(--primary),#8b7fd4);color:#fff;font-size:13px;font-weight:800;box-shadow:0 8px 30px rgba(182,160,255,.3)}
.learn-btn:active{transform:scale(.94);box-shadow:0 4px 15px rgba(182,160,255,.2)}

/* ── Empty ── */
.empty-state{text-align:center}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state .msg{color:var(--muted);font-size:14px}

/* ── Toast ── */
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:100;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}
.toast-save{background:rgba(74,222,128,.15);color:var(--save);border:1px solid rgba(74,222,128,.2)}
.toast-skip{background:rgba(248,113,113,.1);color:var(--skip);border:1px solid rgba(248,113,113,.15)}
.toast-info{background:rgba(182,160,255,.1);color:var(--primary);border:1px solid rgba(182,160,255,.15)}

/* ── Spinner ── */
.spinner{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px}
.orbit{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.report-link{margin-top:32px;font-size:12px;color:var(--muted)}
.report-link a{color:var(--primary)}
</style>
</head>
<body>
<div class="glow glow-top"></div>
<div class="glow glow-bottom"></div>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
const API='/api';
let state={screen:'onboard',token:null,user:null,cards:[],idx:0};

const TOPICS=['Physics','Biology','Neuroscience','History','Psychology','Philosophy','Technology','Mathematics','Economics','Astronomy','Chemistry','Linguistics','Art History','Music Theory','Political Science','Anthropology','Environmental Science','Cognitive Science','Sociology','Computer Science'];

function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast toast-'+type+' show';setTimeout(()=>t.classList.remove('show'),1800)}

async function api(method,path,body){
  const h={};if(state.token)h['Authorization']='Bearer '+state.token;
  if(body)h['Content-Type']='application/json';
  const r=await fetch(API+path,{method,headers:h,body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||'Request failed')}
  return r.json()
}

function render(){const a=document.getElementById('app');state.screen==='onboard'?renderOnboard(a):state.screen==='feed'?renderFeed(a):renderLoading(a)}

function renderLoading(a){a.innerHTML='<div class="screen active"><div class="spinner"><div class="orbit"></div>Agent is curating knowledge for you...</div></div>'}

function renderOnboard(a){
  a.innerHTML=`
    <div class="screen active">
      <div class="logo">BrainByte</div>
      <div class="tagline">An AI agent learns what fascinates you,<br>then curates knowledge just for you.</div>
      <div class="input-wrap"><label>Your Name</label><input id="name" placeholder="e.g. Alex" autocomplete="off"></div>
      <div class="interest-grid" id="grid">${TOPICS.map(t=>`<div class="chip" data-topic="${t}">${t}</div>`).join('')}</div>
      <button class="btn btn-primary" id="start">Start Learning</button>
      <p style="margin-top:16px;font-size:12px;color:var(--muted)">Returning? <span class="login-link" id="login-link">Sign in</span></p>
    </div>`;
  const sel=new Set();
  document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{const t=c.dataset.topic;sel.has(t)?(sel.delete(t),c.classList.remove('selected')):(sel.add(t),c.classList.add('selected'))}));
  document.getElementById('start').addEventListener('click',async()=>{
    const name=document.getElementById('name').value.trim()||'Learner';
    try{state.screen='loading';render();const d=await api('POST','/auth/register',{name,interests:[...sel]});state.token=d.token;state.user=d.user;await loadFeed(8);state.screen='feed';render()}catch(e){toast(e.message,'skip');state.screen='onboard';render()}
  });
  document.getElementById('login-link').addEventListener('click',()=>{const id=prompt('Your user ID:');if(!id)return;(async()=>{try{state.screen='loading';render();const d=await api('POST','/auth/login',{user_id:id});state.token=d.token;state.user=d.user;await loadFeed(8);state.screen='feed';render()}catch(e){toast(e.message,'skip');state.screen='onboard';render()}})()});
}

async function loadFeed(n=8){const d=await api('POST','/feed/curate-batch?count='+n);state.cards=d.bytes;state.idx=0}

function renderFeed(a){
  const card=state.cards[state.idx];
  const sv=(state.user||{})._saved||0;const sk=(state.user||{})._skipped||0;
  if(!card){a.innerHTML=`<div class="header"><div class="header-brand">BrainByte</div><div class="header-stats"><div>Saved<span>${sv}</span></div><div>Skipped<span>${sk}</span></div></div></div><div class="screen active"><div class="spinner"><div class="orbit"></div>Curating more bytes...</div></div>`;loadFeed(5).then(render);return}

  const diffLabel=card.difficulty<=.3?'easy':card.difficulty<=.7?'medium':'hard';
  a.innerHTML=`
    <div class="header"><div class="header-brand">BrainByte</div><div class="header-stats"><div>Saved<span id="sv">${sv}</span></div><div>Skipped<span id="sk">${sk}</span></div></div></div>
    <div class="card-area" id="card-area">
      <div class="card-wrap" id="card-wrap"><div class="card" id="card">
        <div class="card-category">📚 ${card.category||'General'}</div>
        <div class="card-title">${card.title}</div>
        <div class="card-body">${card.content}</div>
        <div class="card-meta"><span class="card-source">${card.source||''} · ${card.format}</span><span class="diff-badge diff-${diffLabel}">${diffLabel==='easy'?'Beginner':diffLabel==='medium'?'Intermediate':'Advanced'}</span></div>
        <div class="agent-reason"><span class="brain">🧠</span><span class="text">Agent: ${card.agent_reason||'curated for you'}</span></div>
      </div></div>
    </div>
    <div class="actions">
      <button class="action-circle skip-btn" id="btn-skip">✕</button>
      <button class="action-circle learn-btn" id="btn-learn">▶</button>
      <button class="action-circle save-btn" id="btn-save">♥</button>
    </div>`;

  const wrap=document.getElementById('card-wrap'),el=document.getElementById('card');
  let sx=0,cx=0,dragging=false,dwellStart=Date.now();
  function dwell(){return(Date.now()-dwellStart)/1000}

  el.addEventListener('pointerdown',e=>{sx=e.clientX;dragging=true;el.setPointerCapture(e.pointerId)});
  el.addEventListener('pointermove',e=>{if(!dragging)return;cx=e.clientX-sx;const r=cx*.015;wrap.style.transform=`translateX(${cx}px) rotate(${r}deg)`});
  el.addEventListener('pointerup',async()=>{if(!dragging)return;dragging=false;const d=dwell();
    wrap.style.transition='transform .35s cubic-bezier(.22,1,.36,1),opacity .35s';
    if(cx<-90){wrap.style.transform='translateX(-120%) rotate(-12deg)';wrap.style.opacity='0';await api('POST','/feed/interact',{content_id:card.id,action:'skip',dwell_time:d}).catch(()=>{});state.user._skipped=(state.user._skipped||0)+1;toast('Skipped — agent noted','skip');next()}
    else if(cx>90){wrap.style.transform='translateX(120%) rotate(12deg)';wrap.style.opacity='0';await api('POST','/feed/interact',{content_id:card.id,action:'save',dwell_time:d,rating:1}).catch(()=>{});state.user._saved=(state.user._saved||0)+1;toast('Saved! Agent is learning 🧠','save');next()}
    else{wrap.style.transform='translateX(0) rotate(0deg)'}
  });

  document.getElementById('btn-skip').addEventListener('click',async()=>{const d=dwell();wrap.style.transition='transform .3s ease-out,opacity .3s';wrap.style.transform='translateX(-120%) rotate(-12deg)';wrap.style.opacity='0';await api('POST','/feed/interact',{content_id:card.id,action:'skip',dwell_time:d}).catch(()=>{});state.user._skipped=(state.user._skipped||0)+1;toast('Skipped','skip');next()});
  document.getElementById('btn-save').addEventListener('click',async()=>{const d=dwell();wrap.style.transition='transform .3s ease-out,opacity .3s';wrap.style.transform='translateX(120%) rotate(12deg)';wrap.style.opacity='0';await api('POST','/feed/interact',{content_id:card.id,action:'save',dwell_time:d,rating:1}).catch(()=>{});state.user._saved=(state.user._saved||0)+1;toast('Saved! Agent is learning','save');next()});
  document.getElementById('btn-learn').addEventListener('click',()=>toast(card.title,'info'));
}

function next(){state.idx++;if(state.idx>=state.cards.length-2)loadFeed(5).then(()=>setTimeout(render,400));else setTimeout(render,400)}

render();
</script>
</body>
</html>
